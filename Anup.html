<!DOCTYPE html>
<html>
<head>
<title>Pro Max Mode 😈</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

.name {
    position: absolute;
    color: lime;
    font-weight: bold;
    animation: fall 3s linear forwards;
    text-shadow: 0 0 10px lime, 0 0 20px green;
}

@keyframes fall {
    0% { transform: translateY(-50px); opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}

.flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,255,0,0.1);
    pointer-events: none;
    animation: blink 0.5s infinite alternate;
}

@keyframes blink {
    from { opacity: 0; }
    to { opacity: 0.4; }
}

#finalMessage {
    position: fixed;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 40px;
    color: red;
    display: none;
}
</style>
</head>
<body>

<div class="flash"></div>
<div id="finalMessage">Relax 😎 It's Just a Prank!</div>

<script>
function createName() {
    const name = document.createElement("div");
    name.classList.add("name");
    name.innerText = "ANUP KUMAR";
    name.style.left = Math.random() * window.innerWidth + "px";
    name.style.fontSize = (20 + Math.random() * 40) + "px";
    document.body.appendChild(name);

    setTimeout(() => {
        name.remove();
    }, 3000);
}

setInterval(createName, 200);

setTimeout(() => {
    document.getElementById("finalMessage").style.display = "block";
}, 6000);
</script>

</body>
</html>
